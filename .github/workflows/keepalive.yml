name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" --max-time 30 https://chinese-culture-app.onrender.com
