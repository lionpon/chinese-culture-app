name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app (keep alive)
        run: |
          curl -sS --retry 3 --retry-delay 10 --retry-max-time 60 \
            -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" \
            --max-time 30 https://chinese-culture-app.onrender.com
