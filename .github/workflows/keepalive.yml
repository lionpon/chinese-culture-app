name: Keep Alive

on:
  schedule:
    - cron: '*/7 * * * *'
    - cron: '*/11 * * * *'
    - cron: '*/13 * * * *'
    - cron: '*/17 * * * *'
  push:
    branches: [master]
  workflow_dispatch:

concurrency: keepalive

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app (keep alive)
        run: |
          for i in 1 2 3; do
            echo "[Attempt $i] $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 45 https://chinese-culture-app.onrender.com)
            echo "HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "OK - app is alive"
              break
            fi
            echo "Retry in 15s..."
            sleep 15
          done
