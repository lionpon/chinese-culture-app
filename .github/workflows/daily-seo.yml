name: Daily SEO Automation

on:
  schedule:
    # 00:30 UTC = 08:30 Beijing / 03:30 Moscow / 09:30 Tokyo/Seoul
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - name: Run daily SEO tasks (sitemap ping + report + warm all locales)
        run: |
          curl -sS --retry 3 --retry-delay 15 --retry-max-time 90 \
            --max-time 60 \
            "https://www.culture-of-china.com/api/cron" | \
            python3 -m json.tool 2>/dev/null || cat

      - name: Warm locale homepages
        run: |
          for lang in "" "/ru" "/ja" "/ko"; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
              "https://www.culture-of-china.com${lang}")
            echo "${lang:-/} → HTTP ${STATUS}"
          done
